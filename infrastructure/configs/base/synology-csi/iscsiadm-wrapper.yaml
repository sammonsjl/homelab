apiVersion: v1
kind: ConfigMap
metadata:
  name: iscsiadm-wrapper
  namespace: synology-csi
data:
  iscsiadm: |
    #!/bin/sh
    # Talos has no /usr/bin/env on the host, so upstream's --chroot-dir
    # approach can't work. Instead, enter the host mount namespace
    # (hostPID gives us /proc/1) and run the iscsi-tools extension shim.
    exec nsenter --mount=/proc/1/ns/mnt -- /usr/local/sbin/iscsiadm "$@"
