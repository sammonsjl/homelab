---
# Vault is external to the cluster and has no reviewer JWT, so it
# authenticates ESO's ServiceAccount tokens by calling the TokenReview
# API as the client itself. That requires the ESO SA to hold
# system:auth-delegator.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eso-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets
---
# Long-lived apiserver-audience token for Vault's token_reviewer_jwt.
# Vault can't use ESO's audience-scoped login JWTs to call TokenReview
# (the apiserver 401s them), so it needs this dedicated reviewer token.
# No data in git — kube-controller-manager fills it in.
apiVersion: v1
kind: Secret
metadata:
  name: vault-token-reviewer
  namespace: external-secrets
  annotations:
    kubernetes.io/service-account.name: external-secrets
type: kubernetes.io/service-account-token
