apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 30m
  # grafana's local-path PVC pins it to one node; rolling upgrades can take
  # several minutes to schedule there, exceeding Helm's default 5m timeout and
  # marking the release failed even though pods come up fine. Give it headroom.
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "87.x"
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
        namespace: monitoring
      interval: 12h

  valuesFrom:
    - kind: ConfigMap
      name: kube-prometheus-stack-values

  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore:
      # Ignore "validated" annotation which is not inserted during install
      - paths: ["/metadata/annotations/prometheus-operator-validated"]
        target:
          kind: PrometheusRule
