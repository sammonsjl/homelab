apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ace-jobs
  namespace: ace-jobs
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/attach", "pods/exec"]
    verbs: ["get", "create"]
