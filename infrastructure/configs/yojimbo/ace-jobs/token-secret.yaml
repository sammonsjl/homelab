# Long-lived token for the ACE control plane (AWX container group
# credential). Holds no data in git — the kube-controller-manager
# populates it asynchronously after the SA exists.
apiVersion: v1
kind: Secret
metadata:
  name: ace-jobs
  namespace: ace-jobs
  annotations:
    kubernetes.io/service-account.name: ace-jobs
type: kubernetes.io/service-account-token
