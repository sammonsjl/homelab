apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/external-secrets/

patches:
  - target:
      kind: ClusterSecretStore
      name: vault
    patch: |-
      - op: replace
        path: /spec/provider/vault/auth/kubernetes/mountPath
        value: kubernetes-yojimbo
